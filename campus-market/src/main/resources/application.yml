server:
  port: 8080

spring:
  application:
    name: campus-market

  datasource:
    url: jdbc:mysql://localhost:3306/campus_market?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: your password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.campusmarket.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===== JWT =====
jwt:
  secret: WTJNVUtpQ1dXcnBFSDJRT2FQREd5ck5jR3JpdmFISzJNREZFV0dOc0hkaz0=
  expiration: 86400

# ===== AI（统一配置，支持 mimo / deepseek / ollama）=====
ai:
  provider: mimo
  api-key: your api-key
  base-url: https://token-plan-cn.xiaomimimo.com/v1
  model: mimo-v2.5-pro
  temperature: 0.1
  max-tokens: 4096
  connect-timeout: 30
  read-timeout: 120
  retry:
    max-attempts: 3
    backoff-ms: 1000
